version: '3.8'

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: nextcloud
    restart: unless-stopped
    volumes:
      - nextcloud_data:/var/www/html
      - nginx_logs:/var/log/nginx:ro
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - internal
    depends_on:
      - nextcloud

  detector:
    build: ./detector
    container_name: detector
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - nginx_logs:/var/log/nginx:ro
      - ./detector/config.yaml:/app/config.yaml
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}

volumes:
  nextcloud_data:
  nginx_logs:
    name: HNG-nginx-logs

networks:
  internal:
    driver: bridge
