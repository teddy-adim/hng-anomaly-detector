log_file: /var/log/nginx/hng-access.log
audit_log: /app/audit.log

detection:
  window_seconds: 60
  baseline_window_minutes: 30
  recalculation_interval: 60
  zscore_threshold: 3.0
  rate_multiplier: 5.0
  error_rate_multiplier: 3.0
  min_baseline_samples: 10
  baseline_floor: 1.0

blocking:
  unban_schedule:
    - 600    # 10 minutes
    - 1800   # 30 minutes
    - 7200   # 2 hours
    - -1     # permanent

dashboard:
  port: 5000
  refresh_seconds: 3

slack:
  webhook_url: ""
